<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Advanced Materials Lab</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="logo">Advanced Materials Lab<span>Jain University, Bengaluru</span></div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="login.html" class="btn-login">Login</a></li>
    </ul>
  </nav>

  <div class="login-page">
    <div class="login-container">
      <div class="login-logo">
        <h2>Staff Portal</h2>
        <p>Advanced Materials Lab</p>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>

      <button class="submit-btn" onclick="handleLogin()">Sign In →</button>
      <p id="login-error" class="error"></p>

      <p style="text-align:center; margin-top: 24px; font-size: 0.82rem;">
        <a href="index.html" style="color: var(--text-muted); text-decoration: none;">← Back to site</a>
      </p>
    </div>
  </div>

  <script>
    async function handleLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('login-error');
      errorEl.textContent = '';

      if (!email || !password) {
        errorEl.textContent = 'Please enter your email and password.';
        return;
      }

      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        if (data.user.role === 'admin') {
          window.location.href = '/admin/dashboard';
        } else {
          window.location.href = '/user-dashboard.html';
        }
      } else {
        errorEl.textContent = data.error || 'Login failed. Please try again.';
      }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
